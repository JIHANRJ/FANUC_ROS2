# move_joint.yaml
# ================
# Configuration for the move_joint example node.
#
# Joint layout for CRX-10iA/L:
#   joint_1 = base rotation    (+ = counterclockwise from above)
#   joint_2 = shoulder         (+ = forward/up)
#   joint_3 = elbow            (+ = up)
#   joint_4 = wrist roll       (+ = counterclockwise from front)
#   joint_5 = wrist pitch      (+ = down)
#   joint_6 = wrist rotation   (+ = counterclockwise from front)
#
# All joint values are in DEGREES. The node converts to radians internally.

move_joint_node:
  ros__parameters:

    planning_group: manipulator
    vel: 0.2        # 20% velocity — smoother for first real-robot runs
    acc: 0.2        # 20% acceleration — gentler starts/stops
    startup_delay: 5.0  # wait for MoveIt/controllers before first goal

    # Seconds to wait at each position before moving to the next
    delay_between_moves: 2.0

    # Position A — near home
    position_a:
      joint_1:  0.0
      joint_2:  0.0
      joint_3:  0.0
      joint_4:  0.0
      joint_5:  0.0
      joint_6:  0.0

    # Position B — gentle but visible loop motion (degrees)
    position_b:
      joint_1:   30.0
      joint_2:  -25.0
      joint_3:   40.0
      joint_4:    0.0
      joint_5:   15.0
      joint_6:    0.0
