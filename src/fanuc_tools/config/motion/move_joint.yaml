# move_joint.yaml
# ================
# Configuration for the move_joint example node.
#
# Joint layout for CRX-10iA/L:
#   joint_1 = base rotation    (+ = counterclockwise from above)
#   joint_2 = shoulder         (+ = forward/up)
#   joint_3 = elbow            (+ = up)
#   joint_4 = wrist roll       (+ = counterclockwise from front)
#   joint_5 = wrist pitch      (+ = down)
#   joint_6 = wrist rotation   (+ = counterclockwise from front)
#
# Conversion: degrees * (pi/180) = radians
#   90 deg  = 1.5708 rad
#   45 deg  = 0.7854 rad
#   180 deg = 3.1416 rad

move_joint_node:
  ros__parameters:

    planning_group: manipulator
    vel: 0.3        # 30% velocity — visible but not too fast
    acc: 0.3        # 30% acceleration

    # Seconds to wait at each position before moving to the next
    delay_between_moves: 2.0

    # Position A — near home
    position_a:
      joint_1:  0.0
      joint_2:  0.0
      joint_3:  0.0
      joint_4:  0.0
      joint_5:  0.0
      joint_6:  0.0

    # Position B — visibly different so you can see the motion clearly
    position_b:
      joint_1:  0.5236    #  30 degrees
      joint_2: -0.7854    # -45 degrees
      joint_3:  1.5708    #  90 degrees
      joint_4:  0.0
      joint_5:  0.7854    #  45 degrees
      joint_6:  0.0
